name: Sync docs from source projects

on:
  # Reusable workflow — called by a workflow in each project repo on push to main.
  workflow_call:
    inputs:
      project:
        description: "Project key (must exist in projects/<name>/config.json)"
        required: true
        type: string
      source_repo:
        description: "Full source repo (owner/name). Defaults to <owner>/<project>."
        required: false
        type: string
        default: ""
      source_ref:
        description: "Ref in the source repo to sync against (defaults to main)"
        required: false
        type: string
        default: "main"
    secrets:
      DOCS_WRITE_TOKEN:
        description: "Fine-scoped PAT with contents:write on the docs repo"
        required: true
      GROQ_API_KEY:
        required: false
      GEMINI_API_KEY:
        required: false
      CEREBRAS_API_KEY:
        required: false
      OPENAI_API_KEY:
        required: false

  # Manual trigger for ad-hoc syncs.
  workflow_dispatch:
    inputs:
      project:
        description: "Project key"
        required: true
        type: string

concurrency:
  group: docs-sync-${{ inputs.project }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout docs repo
        uses: actions/checkout@v4
        with:
          repository: tiagorcfortunato/docs-tifortunato
          token: ${{ secrets.DOCS_WRITE_TOKEN }}
          fetch-depth: 0

      - name: Resolve source repo
        id: src
        run: |
          if [ -n "${{ inputs.source_repo }}" ]; then
            echo "repo=${{ inputs.source_repo }}" >> $GITHUB_OUTPUT
          else
            echo "repo=${{ github.repository_owner }}/${{ inputs.project }}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout source project
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.src.outputs.repo }}
          path: .source/${{ inputs.project }}
          ref: ${{ inputs.source_ref }}
          # Full history — the state file may point at an old SHA if the user
          # pushed many commits. Shallow clones break git log <oldSha>..HEAD.
          fetch-depth: 0

      - name: Point config at checked-out source
        env:
          PROJECT: ${{ inputs.project }}
        run: |
          node -e '
            const fs = require("fs");
            const path = require("path");
            const project = process.env.PROJECT;
            const cfgPath = `projects/${project}/config.json`;
            const cfg = JSON.parse(fs.readFileSync(cfgPath, "utf8"));
            cfg.repo_path = path.join(process.cwd(), ".source", project);
            fs.writeFileSync(cfgPath, JSON.stringify(cfg, null, 2) + "\n");
            console.log("[workflow] repo_path ->", cfg.repo_path);
          '

      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile

      - name: Run docs sync (detects changes, regenerates affected pages)
        env:
          GROQ_API_KEY:     ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          OPENAI_API_KEY:   ${{ secrets.OPENAI_API_KEY }}
        run: pnpm docs:sync ${{ inputs.project }}

      - name: Read sync summary
        id: summary
        if: always()
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message || inputs.project }}
          PROJECT: ${{ inputs.project }}
        run: |
          # First line only — multi-line commit bodies break the heredoc output.
          FIRST_LINE=$(printf '%s' "$COMMIT_MSG" | head -n1)
          if [ -f .sync-summary.md ]; then
            {
              echo 'body<<SYNCEOF'
              cat .sync-summary.md
              echo ''
              echo '---'
              echo "Triggered by: $FIRST_LINE"
              echo 'SYNCEOF'
            } >> "$GITHUB_OUTPUT"
          else
            echo "body=Automated docs sync for $PROJECT." >> "$GITHUB_OUTPUT"
          fi

      - name: Detect regenerated MDX
        id: detect
        if: always()
        run: |
          if git diff --quiet -- "content/docs/projects/${{ inputs.project }}/" 2>/dev/null && \
             git ls-files --others --exclude-standard --error-unmatch \
               "content/docs/projects/${{ inputs.project }}/" >/dev/null 2>&1; then
            # No changes (tracked or untracked) under content/docs
            echo "has_mdx_changes=false" >> $GITHUB_OUTPUT
          else
            if [ -n "$(git status --porcelain -- content/docs/projects/${{ inputs.project }}/)" ]; then
              echo "has_mdx_changes=true" >> $GITHUB_OUTPUT
            else
              echo "has_mdx_changes=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Open PR if docs changed
        if: always() && steps.detect.outputs.has_mdx_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.DOCS_WRITE_TOKEN || secrets.GITHUB_TOKEN }}
          commit-message: "docs(${{ inputs.project }}): auto-sync from source changes"
          branch: auto-sync/${{ inputs.project }}
          delete-branch: false
          title: "docs(${{ inputs.project }}): auto-sync"
          body: ${{ steps.summary.outputs.body }}
          add-paths: |
            content/docs/projects/${{ inputs.project }}/**
            facts/${{ inputs.project }}-facts.json
            scripts/.docs-sync-state.json

      - name: No-op note
        if: always() && steps.detect.outputs.has_mdx_changes != 'true'
        run: |
          echo "::notice::No MDX regenerated this run — leaving any open auto-sync PR untouched."
