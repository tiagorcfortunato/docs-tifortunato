# Paste this file into each source repo as `.github/workflows/docs-sync.yml`
# Then replace PROJECT_KEY with the project name (e.g. `odys`).
# Requires a repo secret `DOCS_WRITE_TOKEN` = a fine-scoped PAT with
# contents:write + pull-requests:write on the docs repo.

name: Sync docs

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  call-docs-sync:
    uses: tiagorcfortunato/docs-tifortunato/.github/workflows/sync.yml@main
    with:
      project: PROJECT_KEY
      # Uncomment if the source repo name differs from the project key (e.g. capital letters):
      # source_repo: owner/Repo-Name
    secrets:
      DOCS_WRITE_TOKEN: ${{ secrets.DOCS_WRITE_TOKEN }}
      GROQ_API_KEY:     ${{ secrets.GROQ_API_KEY }}
      GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
      CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
      OPENAI_API_KEY:   ${{ secrets.OPENAI_API_KEY }}
